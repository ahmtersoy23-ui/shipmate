<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon FBA Template Generator v19</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 via-purple-50 to-pink-50 min-h-screen p-4">
    <script>
        // Iframe guard - prevent direct access
        if (window.self === window.top) {
            window.location.href = '/';
        }
    </script>

    <div id="app"></div>

    <script>
        const { useState, useEffect, createElement: h } = React;

        const API_BASE = '/api/shipmate';

        function getToken() {
            return localStorage.getItem('sso_access_token') || '';
        }

        async function apiCall(method, path, body) {
            const res = await fetch(API_BASE + path, {
                method,
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + getToken()
                },
                body: body != null ? JSON.stringify(body) : undefined
            });
            if (!res.ok) throw new Error('API error ' + res.status);
            return res.json();
        }

        function App() {
            // Reference Database State
            const [referansDB, setReferansDB] = useState([]);
            const [showAddForm, setShowAddForm] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [formData, setFormData] = useState({ fnsku: '', sku: '', size_tier: 'Standard' });

            // Sent Boxes State
            const [sentBoxes, setSentBoxes] = useState([]);

            // Loading & error state for initial data fetch
            const [dbLoading, setDbLoading] = useState(true);
            const [dbError, setDbError] = useState('');

            // Shipment & Analysis State
            const [gemiFile, setGemiFile] = useState(null);
            const [result, setResult] = useState(null);
            const [error, setError] = useState('');
            const [xlsxReady, setXlsxReady] = useState(false);

            // Step 1 checkbox state - SKU selections per category
            const [selectedSkus, setSelectedSkus] = useState({});
            const [step1Completed, setStep1Completed] = useState({});

            // Ineligible batch split state
            const [batchSize, setBatchSize] = useState(10);
            const [splitEnabled, setSplitEnabled] = useState({});

            // Load reference DB and sent boxes from API on mount
            useEffect(() => {
                if (window.XLSX) {
                    setXlsxReady(true);
                }
                const loadData = async () => {
                    setDbLoading(true);
                    setDbError('');
                    try {
                        const [ref, boxes] = await Promise.all([
                            apiCall('GET', '/referans'),
                            apiCall('GET', '/sent-boxes')
                        ]);
                        setReferansDB(ref);
                        setSentBoxes(boxes);
                    } catch (err) {
                        console.error('Load data error:', err);
                        setDbError('Veri yüklenemedi: ' + err.message + ' — Sayfayı yenileyin.');
                    } finally {
                        setDbLoading(false);
                    }
                };
                loadData();
            }, []);

            const readExcelFile = (file) => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const data = new Uint8Array(e.target.result);
                            const workbook = window.XLSX.read(data, { type: 'array' });
                            resolve(workbook);
                        } catch (err) {
                            reject(err);
                        }
                    };
                    reader.onerror = reject;
                    reader.readAsArrayBuffer(file);
                });
            };

            const parseExcelSheet = (workbook, sheetName) => {
                const sheet = workbook.Sheets[sheetName];
                if (!sheet) {
                    throw new Error('Sheet not found: ' + sheetName);
                }

                const jsonData = window.XLSX.utils.sheet_to_json(sheet, { defval: '' });

                return jsonData.map(row => {
                    const normalizedRow = {};
                    Object.keys(row).forEach(key => {
                        const normalizedKey = key.toLowerCase().trim().replace(/\s+/g, '_');
                        normalizedRow[normalizedKey] = String(row[key] || '').trim();
                    });
                    return normalizedRow;
                });
            };

            // ==================== REFERENCE DB FUNCTIONS ====================

            const addReferans = async () => {
                if (!formData.fnsku || !formData.sku) {
                    alert('FNSKU and SKU are required!');
                    return;
                }

                const existing = referansDB.find(r => r.fnsku === formData.fnsku);
                if (existing && !editingId) {
                    if (!confirm('This FNSKU already exists. Update it?')) return;
                }

                try {
                    await apiCall('POST', '/referans', formData);
                    const updated = await apiCall('GET', '/referans');
                    setReferansDB(updated);
                    setEditingId(null);
                    setFormData({ fnsku: '', sku: '', size_tier: 'Standard' });
                    setShowAddForm(false);
                } catch (err) {
                    alert('Save error: ' + err.message);
                }
            };

            const deleteReferans = async (id) => {
                if (confirm('Are you sure you want to delete this record?')) {
                    try {
                        await apiCall('DELETE', '/referans/' + id);
                        const updated = await apiCall('GET', '/referans');
                        setReferansDB(updated);
                    } catch (err) {
                        alert('Delete error: ' + err.message);
                    }
                }
            };

            const editReferans = (item) => {
                setFormData({ fnsku: item.fnsku, sku: item.sku, size_tier: item.size_tier });
                setEditingId(item.id);
                setShowAddForm(true);
            };

            const importReferansFromExcel = async (file) => {
                try {
                    const workbook = await readExcelFile(file);
                    const sheetName = workbook.SheetNames[0];
                    const data = parseExcelSheet(workbook, sheetName);

                    const records = [];
                    data.forEach(row => {
                        const fnsku = row.fnsku || row.FNSKU || '';
                        const sku = row.sku || row.SKU || row.msku || row.MSKU || '';
                        const size_tier = row.size_tier || row.tier || row.size || 'Standard';
                        if (!fnsku || !sku) return;
                        records.push({ fnsku, sku, size_tier });
                    });

                    if (records.length === 0) {
                        alert('No valid rows found in file.');
                        return;
                    }

                    const res = await apiCall('POST', '/referans/bulk', { records });
                    const updated = await apiCall('GET', '/referans');
                    setReferansDB(updated);
                    alert(`Import completed!\n${res.upserted} records saved`);
                } catch (err) {
                    alert('Import error: ' + err.message);
                }
            };

            const exportReferansToExcel = () => {
                if (!xlsxReady || referansDB.length === 0) return;

                const ws_data = [['FNSKU', 'SKU', 'Size Tier']];
                referansDB.forEach(r => {
                    ws_data.push([r.fnsku, r.sku, r.size_tier]);
                });

                const ws = window.XLSX.utils.aoa_to_sheet(ws_data);
                const wb = window.XLSX.utils.book_new();
                window.XLSX.utils.book_append_sheet(wb, ws, 'Reference');
                window.XLSX.writeFile(wb, 'Reference_Backup_' + new Date().toISOString().slice(0,10) + '.xlsx');
            };

            const resetReferansDB = async () => {
                if (confirm('ARE YOU SURE YOU WANT TO DELETE THE ENTIRE REFERENCE DATABASE?\n\nThis action cannot be undone!')) {
                    if (confirm('ARE YOU REALLY SURE?')) {
                        try {
                            await apiCall('DELETE', '/referans/reset');
                            setReferansDB([]);
                            alert('Database has been reset.');
                        } catch (err) {
                            alert('Reset error: ' + err.message);
                        }
                    }
                }
            };

            // ==================== SENT BOXES FUNCTIONS ====================

            const readCSVFile = (file) => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const text = e.target.result;
                            const lines = text.split('\n').filter(line => line.trim());
                            if (lines.length === 0) {
                                resolve([]);
                                return;
                            }

                            // Detect delimiter (comma or semicolon or tab)
                            const firstLine = lines[0];
                            let delimiter = ',';
                            if (firstLine.includes('\t')) delimiter = '\t';
                            else if (firstLine.includes(';')) delimiter = ';';

                            const headers = lines[0].split(delimiter).map(h => h.trim().toLowerCase().replace(/\s+/g, '_'));
                            const data = [];

                            for (let i = 1; i < lines.length; i++) {
                                const values = lines[i].split(delimiter);
                                const row = {};
                                headers.forEach((header, idx) => {
                                    row[header] = (values[idx] || '').trim();
                                });
                                data.push(row);
                            }
                            resolve(data);
                        } catch (err) {
                            reject(err);
                        }
                    };
                    reader.onerror = reject;
                    reader.readAsText(file);
                });
            };

            const importSentBoxesFromExcel = async (file, bulkMode = false) => {
                try {
                    let data;

                    // Check if CSV file
                    if (file.name.toLowerCase().endsWith('.csv')) {
                        data = await readCSVFile(file);
                    } else {
                        const workbook = await readExcelFile(file);
                        const sheetName = workbook.SheetNames[0];
                        data = parseExcelSheet(workbook, sheetName);
                    }

                    // Extract description from filename (remove koli_no_ prefix and extension)
                    let description = file.name.replace(/\.(xlsx|xls|csv)$/i, '');
                    description = description.replace(/^koli_no_/i, '');

                    // Use today's date as upload date
                    const uploadDate = new Date().toISOString().slice(0,10);

                    const records = [];
                    data.forEach(row => {
                        const boxNo = row.koli_no || row.box_no || '';
                        const sku = row.sku || row.SKU || '';
                        if (!boxNo) return;
                        records.push({ box_no: boxNo, sku, date: uploadDate, description });
                    });

                    if (records.length === 0) {
                        return bulkMode ? { added: 0, duplicates: 0 } : null;
                    }

                    const res = await apiCall('POST', '/sent-boxes/bulk', { records });
                    const updated = await apiCall('GET', '/sent-boxes');
                    setSentBoxes(updated);

                    if (bulkMode) {
                        return { added: res.inserted, duplicates: res.skipped };
                    }

                    alert(`Import completed!\n${res.inserted} boxes added\n${res.skipped} duplicates skipped\nDescription: ${description}`);
                } catch (err) {
                    if (!bulkMode) {
                        alert('Import error: ' + err.message);
                    }
                    return null;
                }
            };

            const exportSentBoxesToExcel = () => {
                if (!xlsxReady || sentBoxes.length === 0) return;

                const ws_data = [['Box No', 'SKU', 'Date', 'Description']];
                sentBoxes.forEach(b => {
                    ws_data.push([b.box_no, b.sku || '', b.date || '', b.description || '']);
                });

                const ws = window.XLSX.utils.aoa_to_sheet(ws_data);
                const wb = window.XLSX.utils.book_new();
                window.XLSX.utils.book_append_sheet(wb, ws, 'Sent Boxes');
                window.XLSX.writeFile(wb, 'Sent_Boxes_' + new Date().toISOString().slice(0,10) + '.xlsx');
            };

            const resetSentBoxes = async () => {
                if (confirm('ARE YOU SURE YOU WANT TO DELETE ALL SENT BOXES HISTORY?\n\nThis action cannot be undone!')) {
                    try {
                        await apiCall('DELETE', '/sent-boxes/reset');
                        setSentBoxes([]);
                        alert('Sent boxes history has been reset.');
                    } catch (err) {
                        alert('Reset error: ' + err.message);
                    }
                }
            };

            const markBoxesAsSent = async (items) => {
                const today = new Date().toISOString().slice(0,10);
                const records = [];

                items.forEach(item => {
                    item.boxes.forEach(box => {
                        records.push({ box_no: box.koli_no, sku: item.sku, date: today });
                    });
                });

                if (records.length === 0) return 0;

                try {
                    const res = await apiCall('POST', '/sent-boxes/bulk', { records });
                    const updated = await apiCall('GET', '/sent-boxes');
                    setSentBoxes(updated);
                    return res.inserted;
                } catch (err) {
                    alert('Mark as sent error: ' + err.message);
                    return 0;
                }
            };

            // ==================== SHIPMENT ANALYSIS FUNCTIONS ====================

            const processGemi = async () => {
                if (!gemiFile) {
                    setError('Please upload the shipment file!');
                    return;
                }

                if (referansDB.length === 0) {
                    setError('Reference database is empty! Add references first.');
                    return;
                }

                try {
                    const gemiWorkbook = await readExcelFile(gemiFile);
                    const gemiSheetName = gemiWorkbook.SheetNames.find(s => s.toLowerCase().includes('gemi')) || gemiWorkbook.SheetNames[0];
                    const gemiData = parseExcelSheet(gemiWorkbook, gemiSheetName);

                    const templates = generateTemplates(gemiData);

                    setResult(templates);
                    setError('');

                    // Initialize all checkboxes as checked
                    const initialSelected = {};
                    Object.keys(templates.categories).forEach(catKey => {
                        initialSelected[catKey] = {};
                        templates.categories[catKey].forEach(item => {
                            initialSelected[catKey][item.sku] = true;
                        });
                    });
                    setSelectedSkus(initialSelected);
                    setStep1Completed({});
                } catch (err) {
                    setError('Error: ' + err.message);
                    console.error('Error:', err);
                }
            };

            const generateTemplates = (gemiData) => {
                // Create map from Reference DB
                const fnSkuMap = {};
                referansDB.forEach(row => {
                    fnSkuMap[row.fnsku] = { sku: row.sku, size_tier: row.size_tier };
                });

                // Create set from Sent Boxes for quick lookup
                const sentBoxNosMap = {};
                sentBoxes.forEach(b => {
                    sentBoxNosMap[b.box_no] = { sku: b.sku, date: b.date };
                });

                const skuGroups = {};
                const missingFnskus = new Set();
                const skippedBoxes = [];
                const duplicateKoliNos = [];
                const seenKoliNos = {};
                let totalBoxesInGemi = gemiData.length;
                let totalUnitsInGemi = 0;

                // First check for duplicate box numbers and previously sent boxes
                gemiData.forEach((box, idx) => {
                    const koliNo = box.koli_no || box.box_no || ('Row-' + (idx + 2));
                    if (seenKoliNos[koliNo]) {
                        duplicateKoliNos.push({ koli_no: koliNo, row1: seenKoliNos[koliNo], row2: idx + 2 });
                    } else {
                        seenKoliNos[koliNo] = idx + 2;
                    }
                });

                gemiData.forEach((box, idx) => {
                    const koliNo = box.koli_no || box.box_no || ('Row-' + (idx + 2));
                    const fnsku = (box.fnsku || '').trim();
                    const qty = parseInt(box.quantity) || 0;

                    // Skip previously sent boxes
                    if (sentBoxNosMap[koliNo]) {
                        skippedBoxes.push({ koli_no: koliNo, reason: 'Previously sent (' + (sentBoxNosMap[koliNo].date || '') + ')', fnsku: fnsku || '-' });
                        return;
                    }

                    totalUnitsInGemi += qty;

                    if (!fnsku || fnsku.length === 0) {
                        skippedBoxes.push({ koli_no: koliNo, reason: 'FNSKU empty', fnsku: '-' });
                        return;
                    }

                    if (fnsku.length < 5 || /^[a-z\s]+$/i.test(fnsku)) {
                        skippedBoxes.push({ koli_no: koliNo, reason: 'Invalid format', fnsku: fnsku });
                        return;
                    }

                    const mapping = fnSkuMap[fnsku];
                    if (!mapping) {
                        missingFnskus.add(fnsku);
                        skippedBoxes.push({ koli_no: koliNo, reason: 'Not in reference', fnsku: fnsku });
                        return;
                    }

                    const sku = mapping.sku;
                    if (!sku) {
                        skippedBoxes.push({ koli_no: koliNo, reason: 'SKU empty', fnsku: fnsku });
                        return;
                    }

                    if (!skuGroups[sku]) {
                        skuGroups[sku] = {
                            sku: sku,
                            fnsku: fnsku,
                            name: box.name || box.product_name || '',
                            tier: mapping.size_tier,
                            boxes: []
                        };
                    }

                    skuGroups[sku].boxes.push({
                        koli_no: koliNo,
                        quantity: qty,
                        // cm -> inch (1 cm = 0.393701 inch), kg -> lbs (1 kg = 2.20462 lbs)
                        weight: (parseFloat(box.weight || 0) * 2.20462).toFixed(1),
                        length: (parseFloat(box.length || 0) * 0.393701).toFixed(1),
                        width: (parseFloat(box.width || 0) * 0.393701).toFixed(1),
                        height: (parseFloat(box.height || 0) * 0.393701).toFixed(1)
                    });
                });

                const categories = {
                    standardPffEligible: [],
                    standardPffIneligible: [],
                    oversizePffEligible: [],
                    oversizePffIneligible: []
                };

                let totalBoxesProcessed = 0;
                let totalUnitsProcessed = 0;

                Object.values(skuGroups).forEach(group => {
                    const isStandard = (group.tier || '').toLowerCase() === 'standard';

                    // Skip SKUs with <5 total units — can't use Amazon-optimized routing
                    const totalGroupUnits = group.boxes.reduce((sum, box) => sum + box.quantity, 0);
                    if (totalGroupUnits < 5) {
                        skippedBoxes.push(...group.boxes.map(box => ({
                            koli_no: box.koli_no,
                            reason: 'SKU total <5 units (' + totalGroupUnits + ')',
                            fnsku: group.fnsku
                        })));
                        return;
                    }

                    // Group boxes by quantity
                    const qtyGroups = {};
                    group.boxes.forEach(box => {
                        const qty = box.quantity;
                        if (!qtyGroups[qty]) {
                            qtyGroups[qty] = [];
                        }
                        qtyGroups[qty].push(box);
                    });

                    // Separate PFF Eligible (5+ boxes with equal quantity) from Ineligible
                    const remainingBoxes = [];

                    Object.entries(qtyGroups).forEach(([qty, boxes]) => {
                        if (boxes.length >= 5) {
                            // PFF Eligible - meets 5 identical carton rule ($0 placement fee)
                            const boxCount = boxes.length;
                            const totalQty = boxes.reduce((sum, box) => sum + box.quantity, 0);

                            totalBoxesProcessed += boxCount;
                            totalUnitsProcessed += totalQty;

                            const item = {
                                sku: group.sku,
                                fnsku: group.fnsku,
                                name: group.name,
                                tier: group.tier,
                                boxes: boxes,
                                boxCount: boxCount,
                                totalQty: totalQty,
                                quantityValue: parseInt(qty)
                            };

                            if (isStandard) {
                                categories.standardPffEligible.push(item);
                            } else {
                                categories.oversizePffEligible.push(item);
                            }
                        } else {
                            remainingBoxes.push(...boxes);
                        }
                    });

                    // PFF Ineligible - does not meet 5 identical carton rule (placement fee applies)
                    if (remainingBoxes.length > 0) {
                        const boxCount = remainingBoxes.length;
                        const totalQty = remainingBoxes.reduce((sum, box) => sum + box.quantity, 0);

                        totalBoxesProcessed += boxCount;
                        totalUnitsProcessed += totalQty;

                        const item = {
                            sku: group.sku,
                            fnsku: group.fnsku,
                            name: group.name,
                            tier: group.tier,
                            boxes: remainingBoxes,
                            boxCount: boxCount,
                            totalQty: totalQty,
                            quantityValue: Math.round(totalQty / boxCount)
                        };

                        if (isStandard) {
                            categories.standardPffIneligible.push(item);
                        } else {
                            categories.oversizePffIneligible.push(item);
                        }
                    }
                });

                const verification = {
                    totalBoxesInGemi,
                    totalUnitsInGemi,
                    totalBoxesProcessed,
                    totalUnitsProcessed,
                    boxesMatch: totalBoxesInGemi === totalBoxesProcessed,
                    unitsMatch: totalUnitsInGemi === totalUnitsProcessed
                };

                return {
                    categories,
                    verification,
                    missingFnskus: Array.from(missingFnskus),
                    skippedBoxes,
                    duplicateKoliNos,
                };
            };

            // ==================== BATCH SPLIT HELPER ====================

            const splitIntoBatches = (items, batchSize) => {
                // Sort items by box count descending (pack big SKUs first)
                const sorted = [...items].sort((a, b) => b.boxCount - a.boxCount);

                // Pack whole SKU groups into batches (never split a SKU across batches)
                const batches = [];
                let currentBatch = [];
                let currentBoxCount = 0;

                sorted.forEach(item => {
                    // If adding this SKU would exceed batch size AND batch is not empty, start new batch
                    if (currentBoxCount > 0 && currentBoxCount + item.boxCount > batchSize) {
                        batches.push(currentBatch);
                        currentBatch = [];
                        currentBoxCount = 0;
                    }
                    currentBatch.push({
                        ...item,
                        quantityValue: item.boxes.length > 0 ? Math.round(item.totalQty / item.boxCount) : 0
                    });
                    currentBoxCount += item.boxCount;
                });

                if (currentBatch.length > 0) {
                    batches.push(currentBatch);
                }

                // If last batch has fewer boxes than half of batchSize, redistribute to others
                if (batches.length > 1) {
                    const lastBatch = batches[batches.length - 1];
                    const lastBoxCount = lastBatch.reduce((sum, item) => sum + item.boxCount, 0);
                    if (lastBoxCount < batchSize / 2) {
                        batches.pop();
                        // Distribute last batch items across remaining batches (round-robin by least boxes)
                        lastBatch.forEach(item => {
                            // Find batch with fewest boxes
                            let minIdx = 0;
                            let minBoxes = Infinity;
                            batches.forEach((b, i) => {
                                const bc = b.reduce((s, it) => s + it.boxCount, 0);
                                if (bc < minBoxes) { minBoxes = bc; minIdx = i; }
                            });
                            batches[minIdx].push(item);
                        });
                    }
                }

                return batches;
            };

            // ==================== STEP 1 & 2 FUNCTIONS ====================

            const sortItems = (items) => {
                return [...items].sort((a, b) => {
                    const skuA = a.sku.toUpperCase();
                    const skuB = b.sku.toUpperCase();
                    if (skuA < skuB) return -1;
                    if (skuA > skuB) return 1;
                    return 0;
                });
            };

            const copyStep1ToClipboard = (items, categoryKey) => {
                const sortedItems = sortItems(items);
                const lines = ['Merchant SKU\tQuantity'];
                sortedItems.forEach(item => {
                    lines.push(item.sku + '\t' + item.totalQty);
                });

                const text = lines.join('\n');

                // Copy as HTML table as well - Excel understands this better (no header row)
                const html = '<table>' +
                    sortedItems.map(item => '<tr><td>' + item.sku + '</td><td>' + item.totalQty + '</td></tr>').join('') +
                    '</table>';

                navigator.clipboard.write([
                    new ClipboardItem({
                        'text/plain': new Blob([text], { type: 'text/plain' }),
                        'text/html': new Blob([html], { type: 'text/html' })
                    })
                ]).then(() => {
                    alert('Copied to clipboard! You can paste into Excel.');
                    setStep1Completed(prev => ({ ...prev, [categoryKey]: true }));
                }).catch(err => {
                    // Fallback to old method
                    navigator.clipboard.writeText(text).then(() => {
                        alert('Copied to clipboard! You can paste into Excel.');
                        setStep1Completed(prev => ({ ...prev, [categoryKey]: true }));
                    }).catch(err2 => {
                        alert('Copy error: ' + err2.message);
                    });
                });
            };

            const downloadStep1XLSX = (items, filename, categoryKey) => {
                if (!xlsxReady) return;

                try {
                    const sortedItems = sortItems(items);
                    const ws_data = [['Merchant SKU', 'Quantity']];
                    sortedItems.forEach(item => {
                        ws_data.push([item.sku, item.totalQty]);
                    });

                    const ws = window.XLSX.utils.aoa_to_sheet(ws_data);
                    const wb = window.XLSX.utils.book_new();
                    window.XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');
                    window.XLSX.writeFile(wb, filename);

                    setStep1Completed(prev => ({ ...prev, [categoryKey]: true }));
                } catch (error) {
                    alert('Download error: ' + error.message);
                }
            };

            const toggleSku = (categoryKey, sku) => {
                setSelectedSkus(prev => ({
                    ...prev,
                    [categoryKey]: {
                        ...(prev[categoryKey] || {}),
                        [sku]: !(prev[categoryKey] || {})[sku]
                    }
                }));
            };

            const toggleAllSkus = (categoryKey, items, checked) => {
                const newSelected = {};
                items.forEach(item => {
                    newSelected[item.sku] = checked;
                });
                setSelectedSkus(prev => ({
                    ...prev,
                    [categoryKey]: newSelected
                }));
            };

            const getSelectedItems = (categoryKey) => {
                const items = result.categories[categoryKey];
                const selected = selectedSkus[categoryKey] || {};
                return items.filter(item => selected[item.sku]);
            };

            const downloadStep2XLSX = (items, filename, packGroupNumber) => {
                if (!xlsxReady) return;

                try {
                    const sortedItems = sortItems(items);

                    const totalBoxes = sortedItems.reduce((sum, item) => sum + item.boxes.length, 0);

                    const ws_data = [
                        ['Provide the box details for this pack group below.'],
                        [],
                        ['Pack group: ' + packGroupNumber],
                        ['Total SKUs: ' + sortedItems.length],
                        [],
                        ['', '', '', '', '', '', '', '', '', '', 'Total box count:', totalBoxes],
                        []
                    ];

                    const headerRow = [
                        'SKU', 'Product title', 'ASIN', 'FNSKU', 'Condition', 'Prep type',
                        'Who preps unit?', 'Who labels unit?', 'Expected quantity'
                    ];

                    for (let i = 1; i <= totalBoxes; i++) {
                        headerRow.push('Box ' + i + ' quantity');
                    }
                    ws_data.push(headerRow);

                    let currentBoxIndex = 0;

                    sortedItems.forEach(item => {
                        const row = [
                            item.sku, item.name || '', '', item.fnsku,
                            'New/Item', 'NONE', 'No prep needed', 'By seller', item.totalQty
                        ];

                        for (let i = 0; i < currentBoxIndex; i++) row.push('');
                        item.boxes.forEach(box => row.push(box.quantity));
                        const remainingBoxes = totalBoxes - currentBoxIndex - item.boxes.length;
                        for (let i = 0; i < remainingBoxes; i++) row.push('');

                        currentBoxIndex += item.boxes.length;
                        ws_data.push(row);
                    });

                    ws_data.push([]);
                    ws_data.push([]);

                    const boxNameRow = ['', '', '', 'Name of box'];
                    for (let i = 0; i < 5; i++) boxNameRow.push('');

                    let globalBoxNum = 1;
                    sortedItems.forEach(item => {
                        for (let i = 0; i < item.boxes.length; i++) {
                            boxNameRow.push('P' + packGroupNumber + ' - B' + globalBoxNum);
                            globalBoxNum++;
                        }
                    });
                    ws_data.push(boxNameRow);

                    ['weight', 'width', 'length', 'height'].forEach(prop => {
                        const label = prop === 'weight' ? 'Box weight (lb)' : 'Box ' + prop + ' (inch)';
                        const row = ['', '', '', label];
                        for (let i = 0; i < 5; i++) row.push('');
                        sortedItems.forEach(item => {
                            item.boxes.forEach(box => row.push(box[prop] || ''));
                        });
                        ws_data.push(row);
                    });

                    const ws = window.XLSX.utils.aoa_to_sheet(ws_data);
                    const wb = window.XLSX.utils.book_new();
                    window.XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');
                    window.XLSX.writeFile(wb, filename);
                } catch (error) {
                    alert('Download error: ' + error.message);
                }
            };

            const downloadBoxMapping = (items, filename, packGroupNumber) => {
                if (!xlsxReady) return;

                try {
                    const sortedItems = sortItems(items);

                    const ws_data = [['Box No', 'Box ID', 'SKU', 'FNSKU', 'Quantity']];

                        h('div', { className: 'grid grid-cols-2 gap-4' },
                            [
                                { key: 'standardPffEligible', title: 'Standard PFF Eligible', color: 'bg-green-100 text-green-800' },
                                { key: 'standardPffIneligible', title: 'Standard PFF Ineligible', color: 'bg-red-100 text-red-800' },
                                { key: 'oversizePffEligible', title: 'Oversize PFF Eligible', color: 'bg-green-100 text-green-800' },
                                { key: 'oversizePffIneligible', title: 'Oversize PFF Ineligible', color: 'bg-red-100 text-red-800' }
                            ].map(cat =>
                                h('div', { key: cat.key, className: cat.color + ' rounded-lg p-4 text-center' },
                                    h('div', { className: 'text-sm font-semibold mb-1' }, cat.title),
                                    h('div', { className: 'text-3xl font-bold' }, result.categories[cat.key].length),
                                    h('div', { className: 'text-xs mt-1' },
                                        result.categories[cat.key].reduce((sum, item) => sum + item.boxCount, 0) + ' boxes'
                                    )
                                )
                            )
                        )
                    ),

                    // ==================== CATEGORY CARDS ====================
                    h('div', { className: 'grid grid-cols-1 gap-6' },
                        [
                            { key: 'standardPffEligible', title: 'Standard PFF Eligible', color: 'border-green-500', pack: 1 },
                            { key: 'standardPffIneligible', title: 'Standard PFF Ineligible', color: 'border-red-500', pack: 2 },
                            { key: 'oversizePffEligible', title: 'Oversize PFF Eligible', color: 'border-green-500', pack: 3 },
                            { key: 'oversizePffIneligible', title: 'Oversize PFF Ineligible', color: 'border-red-500', pack: 4 }
                        ].flatMap(cat => {
                            const items = result.categories[cat.key];
                            if (items.length === 0) return [];

                            const isIneligible = cat.key.includes('Ineligible');
                            const isSplit = isIneligible && splitEnabled[cat.key];
                            const totalBoxCount = items.reduce((sum, item) => sum + item.boxCount, 0);

                            // Build list of card groups: either 1 card (normal) or N batch cards (split)
                            const cardGroups = [];

                            if (isSplit) {
                                const batches = splitIntoBatches(items, batchSize);
                                batches.forEach((batchItems, bIdx) => {
                                    cardGroups.push({
                                        cardKey: cat.key + '-batch-' + bIdx,
                                        title: cat.title + ' — Batch ' + (bIdx + 1) + '/' + batches.length,
                                        items: batchItems,
                                        pack: cat.pack,
                                        batchLabel: 'B' + (bIdx + 1)
                                    });
                                });
                            } else {
                                cardGroups.push({
                                    cardKey: cat.key,
                                    title: cat.title,
                                    items: items,
                                    pack: cat.pack,
                                    batchLabel: null
                                });
                            }

                            // Ineligible split control panel + cards
                            const elements = [];

                            if (isIneligible) {
                                elements.push(
                                    h('div', { key: cat.key + '-split-panel', className: 'bg-amber-50 border border-amber-300 rounded-xl p-4' },
                                        h('div', { className: 'flex items-center justify-between flex-wrap gap-3' },
                                            h('div', { className: 'flex-1 min-w-0' },
                                                h('p', { className: 'text-sm text-amber-800 font-semibold' },
                                                    totalBoxCount + ' kutu PFF Ineligible. Batch\'lere bolmek placement fee\'yi dusurur.'
                                                )
                                            ),
                                            h('div', { className: 'flex items-center gap-3' },
                                                h('label', { className: 'flex items-center gap-2 text-sm font-semibold text-amber-900' },
                                                    h('input', {
                                                        type: 'checkbox',
                                                        checked: !!splitEnabled[cat.key],
                                                        onChange: () => setSplitEnabled(prev => ({ ...prev, [cat.key]: !prev[cat.key] })),
                                                        className: 'w-4 h-4'
                                                    }),
                                                    'Batch\'lere bol'
                                                ),
                                                splitEnabled[cat.key] && h('select', {
                                                    value: batchSize,
                                                    onChange: (e) => setBatchSize(parseInt(e.target.value)),
                                                    className: 'border border-amber-400 rounded px-2 py-1 text-sm bg-white'
                                                },
                                                    h('option', { value: 5 }, '5 kutu/batch'),
                                                    h('option', { value: 10 }, '10 kutu/batch'),
                                                    h('option', { value: 15 }, '15 kutu/batch'),
                                                    h('option', { value: 20 }, '20 kutu/batch')
                                                ),
                                                isSplit && h('span', { className: 'text-xs text-amber-700 font-semibold' },
                                                    splitIntoBatches(items, batchSize).length + ' batch'
                                                )
                                            )
                                        )
                                    )
                                );
                            }

                            // Render each card group
                            cardGroups.forEach(cg => {
                                const cgKey = cg.cardKey;
                                const cgItems = cg.items;
                                const isStep1Done = step1Completed[cgKey];
                                const selectedItems = (cgItems || []).filter(item => selectedSkus[cgKey]?.[item.sku] !== false);
                                const selectedCount = selectedItems.length;

                                elements.push(
                                    h('div', { key: cgKey, className: 'bg-white rounded-xl shadow-lg p-6 border-l-4 ' + cat.color },
                                        h('div', { className: 'flex justify-between items-center mb-4' },
                                            h('h3', { className: 'font-bold text-xl' }, cg.title),
                                            h('span', { className: 'text-sm text-gray-500' },
                                                cgItems.length + ' SKU, ' + cgItems.reduce((sum, item) => sum + item.boxCount, 0) + ' boxes'
                                            )
                                        ),

                                        // STEP 1 Section
                                        h('div', { className: 'mb-4 p-4 bg-blue-50 rounded-lg' },
                                            h('h4', { className: 'font-semibold mb-3 text-blue-800' }, 'STEP 1 - List to Send to Amazon'),

                                            h('div', { className: 'bg-white rounded border mb-3 max-h-48 overflow-y-auto' },
                                                h('table', { className: 'w-full text-sm' },
                                                    h('thead', { className: 'bg-gray-100 sticky top-0' },
                                                        h('tr', null,
                                                            h('th', { className: 'text-left p-2 font-semibold' }, 'Merchant SKU'),
                                                            h('th', { className: 'text-right p-2 font-semibold' }, 'Quantity')
                                                        )
                                                    ),
                                                    h('tbody', null,
                                                        sortItems(cgItems).map((item, idx) =>
                                                            h('tr', { key: item.sku, className: idx % 2 === 0 ? 'bg-white' : 'bg-gray-50' },
                                                                h('td', { className: 'p-2 font-mono text-blue-600' }, item.sku),
                                                                h('td', { className: 'p-2 text-right font-semibold' }, item.totalQty)
                                                            )
                                                        )
                                                    )
                                                )
                                            ),

                                            h('div', { className: 'flex gap-2' },
                                                h('button', {
                                                    onClick: () => copyStep1ToClipboard(cgItems, cgKey),
                                                    className: 'flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-semibold text-sm'
                                                }, '📋 Copy (for Excel)'),
                                                h('button', {
                                                    onClick: () => downloadStep1XLSX(cgItems, 'Step1_' + cgKey + '.xlsx', cgKey),
                                                    className: 'flex-1 px-4 py-2 bg-blue-800 text-white rounded-lg hover:bg-blue-900 font-semibold text-sm'
                                                }, '📥 Download Excel')
                                            ),

                                            isStep1Done && h('p', { className: 'text-green-600 text-sm mt-2 font-semibold text-center' },
                                                '✓ Step 1 completed'
                                            )
                                        ),

                                        // STEP 2 Section
                                        isStep1Done && h('div', { className: 'p-4 bg-purple-50 rounded-lg' },
                                            h('div', { className: 'flex justify-between items-center mb-3' },
                                                h('h4', { className: 'font-semibold text-purple-800' },
                                                    'STEP 2 - Amazon Approved (' + selectedCount + '/' + cgItems.length + ' selected)'
                                                ),
                                                h('div', { className: 'bg-purple-200 px-3 py-1 rounded-lg' },
                                                    h('span', { className: 'text-purple-900 font-bold text-sm' },
                                                        'Total Boxes: ' + selectedItems.reduce((sum, item) => sum + item.boxCount, 0)
                                                    )
                                                )
                                            ),

                                            h('div', { className: 'flex gap-2 mb-3' },
                                                h('button', {
                                                    onClick: () => toggleAllSkus(cgKey, cgItems, true),
                                                    className: 'px-3 py-1 bg-green-100 text-green-800 rounded text-xs font-semibold hover:bg-green-200'
                                                }, 'Select All'),
                                                h('button', {
                                                    onClick: () => toggleAllSkus(cgKey, cgItems, false),
                                                    className: 'px-3 py-1 bg-red-100 text-red-800 rounded text-xs font-semibold hover:bg-red-200'
                                                }, 'Deselect All')
                                            ),

                                            h('div', { className: 'bg-white rounded border mb-3 max-h-80 overflow-y-auto' },
                                                sortItems(cgItems).map((item, idx) => {
                                                    const isSelected = selectedSkus[cgKey]?.[item.sku] !== false;
                                                    const koliNos = item.boxes.map(b => b.koli_no + '(' + b.quantity + ')').join(', ');
                                                    return h('label', {
                                                        key: item.sku + '-' + item.quantityValue,
                                                        className: 'block p-3 cursor-pointer hover:bg-gray-50 border-b ' +
                                                            (isSelected ? '' : 'bg-red-50 opacity-60')
                                                    },
                                                        h('div', { className: 'flex items-center' },
                                                            h('input', {
                                                                type: 'checkbox',
                                                                checked: isSelected,
                                                                onChange: () => toggleSku(cgKey, item.sku),
                                                                className: 'w-5 h-5 mr-3'
                                                            }),
                                                            h('div', { className: 'flex-1' },
                                                                h('span', { className: 'font-mono text-blue-600 font-semibold' }, item.sku),
                                                                h('span', { className: 'text-gray-500 text-sm ml-3' },
                                                                    item.boxCount + ' boxes, ' + item.totalQty + ' units'
                                                                )
                                                            )
                                                        ),
                                                        h('div', { className: 'ml-8 mt-1 text-xs text-gray-400' },
                                                            'Boxes: ' + koliNos
                                                        )
                                                    );
                                                })
                                            ),

                                            h('div', { className: 'flex gap-2 mb-2' },
                                                h('button', {
                                                    onClick: () => downloadStep2XLSX(selectedItems, 'Step2_' + cgKey + '.xlsx', cg.pack),
                                                    disabled: selectedCount === 0,
                                                    className: 'flex-1 px-4 py-3 bg-purple-600 text-white rounded-lg hover:bg-purple-700 font-semibold disabled:opacity-50 disabled:cursor-not-allowed'
                                                }, 'Download STEP 2 (' + selectedCount + ' SKU)'),
                                                h('button', {
                                                    onClick: () => downloadBoxMapping(selectedItems, 'Mapping_' + cgKey + '.xlsx', cg.pack),
                                                    disabled: selectedCount === 0,
                                                    className: 'flex-1 px-4 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 font-semibold disabled:opacity-50 disabled:cursor-not-allowed'
                                                }, 'Download Mapping')
                                            ),
                                            h('button', {
                                                onClick: async () => {
                                                    const count = await markBoxesAsSent(selectedItems);
                                                    alert(count + ' boxes marked as sent!');
                                                },
                                                disabled: selectedCount === 0,
                                                className: 'w-full px-4 py-2 bg-orange-500 text-white rounded-lg hover:bg-orange-600 font-semibold text-sm disabled:opacity-50 disabled:cursor-not-allowed'
                                            }, '✓ Mark Selected as Sent (' + selectedItems.reduce((sum, item) => sum + item.boxCount, 0) + ' boxes)')
                                        )
                                    )
                                );
                            });

                            return elements;
                        })
                    )
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('app'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
